<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zegama-Aizkorri 2026 · Live</title>
<style>
  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #21262d;
    --border:    #30363d;
    --text:      #e6edf3;
    --muted:     #8b949e;
    --orange:    #f0883e;
    --green:     #3fb950;
    --red:       #f85149;
    --blue:      #58a6ff;
    --purple:    #d2a8ff;
    --gold:      #e3b341;
    --female-bg: rgba(210,168,255,0.07);
    --male-bg:   rgba(88,166,255,0.05);
    --fav-bg:    rgba(240,136,62,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a0a00 0%, #0d1117 50%, #001a0d 100%);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    min-height: 72px;
  }

  .header-title {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .header-title h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    background: linear-gradient(90deg, var(--orange), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-title .edition {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--green);
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  .refresh-info {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #refresh-countdown {
    display: inline-block;
    min-width: 24px;
    color: var(--orange);
    font-weight: 600;
  }

  .btn-refresh {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-refresh:hover { background: var(--orange); border-color: var(--orange); color: #000; }

  /* ── STATS BAR ── */
  .stats-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .stat-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
  }

  .stat-item .val { font-weight: 700; font-size: 15px; }
  .stat-item.running .val  { color: var(--green); }
  .stat-item.finished .val { color: var(--gold); }
  .stat-item.retired .val  { color: var(--red); }
  .stat-item.waiting .val  { color: var(--muted); }
  .stat-item.total .val    { color: var(--text); }

  /* ── CONTROLS ── */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 180px;
    max-width: 320px;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px 7px 32px;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--blue); }
  #search::placeholder { color: var(--muted); }

  .filter-group {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .filter-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-right: 2px;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--orange); color: var(--text); }
  .pill.active { background: var(--orange); border-color: var(--orange); color: #000; font-weight: 700; }
  .pill.active-green  { background: var(--green);  border-color: var(--green);  color: #000; font-weight: 700; }
  .pill.active-purple { background: var(--purple); border-color: var(--purple); color: #000; font-weight: 700; }
  .pill.active-blue   { background: var(--blue);   border-color: var(--blue);   color: #000; font-weight: 700; }
  .pill.active-gold   { background: var(--gold);   border-color: var(--gold);   color: #000; font-weight: 700; }

  .pill-fav.active { background: transparent; border-color: var(--orange); color: var(--orange); }

  /* filters-row: plain flex on desktop, scrollable on mobile (see @media) */
  .filters-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    flex: 1;
  }

  /* ── TABLE WRAPPER ── */
  .table-wrap {
    overflow-x: auto;
    padding: 0 24px 40px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 16px;
    min-width: 700px;
  }

  thead th {
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    padding: 10px 12px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    position: sticky;
    top: 0;
  }

  thead th:hover { color: var(--text); }

  thead th.sorted { color: var(--orange); }

  thead th .sort-arrow { margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-arrow { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }

  tbody tr:hover { background: var(--surface2) !important; }

  tbody tr.row-M    { background: var(--male-bg); }
  tbody tr.row-F    { background: var(--female-bg); }
  tbody tr.row-fav  { background: var(--fav-bg) !important; }

  tbody td {
    padding: 9px 12px;
    font-size: 13px;
    white-space: nowrap;
  }

  td.pos { font-weight: 700; color: var(--muted); font-size: 12px; width: 36px; }
  td.pos .medal { font-size: 16px; }

  td.fav-cell { width: 32px; text-align: center; }
  .fav-btn {
    background: none; border: none; cursor: pointer;
    font-size: 16px; padding: 0; line-height: 1;
    color: var(--border);
    transition: color 0.15s, transform 0.15s;
  }
  .fav-btn:hover { transform: scale(1.3); }
  .fav-btn.on { color: var(--orange); }

  td.name-cell { font-weight: 500; min-width: 180px; }
  td.name-cell .firstname { color: var(--muted); font-weight: 400; font-size: 12px; margin-left: 4px; }

  td.bib-cell { color: var(--muted); font-size: 12px; }

  td.city-cell { color: var(--muted); font-size: 12px; max-width: 130px; overflow: hidden; text-overflow: ellipsis; }

  td.cat-cell { font-size: 11px; font-weight: 600; }

  td.time-cell { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; }
  td.gap-cell  { font-family: "SF Mono", "Fira Code", monospace; font-size: 12px; color: var(--muted); }

  .status-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .status-0 { background: rgba(227,179,65,0.15);  color: var(--gold);  }
  .status-1 { background: rgba(63,185,80,0.15);   color: var(--green); }
  .status-2 { background: rgba(248,81,73,0.15);   color: var(--red);   }
  .status-3 { background: rgba(248,81,73,0.15);   color: var(--red);   }
  .status-4 { background: rgba(139,148,158,0.1);  color: var(--muted); }

  .cat-senm { color: var(--blue);   }
  .cat-senf { color: var(--purple); }
  .cat-vetm { color: var(--gold);   }
  .cat-vetf { color: var(--orange); }

  .progress-bar {
    display: flex;
    gap: 2px;
    margin-top: 3px;
  }
  .progress-bar .seg {
    height: 3px;
    border-radius: 2px;
    flex: 1;
    background: var(--border);
    transition: background 0.3s;
  }
  .progress-bar .seg.done { background: var(--green); }
  .progress-bar .seg.finish { background: var(--gold); }

  /* ── EXPANDED ROW ── */
  tr.expanded-row td {
    background: var(--surface) !important;
    padding: 0;
    cursor: default;
  }

  .split-panel {
    padding: 16px 20px;
  }

  .split-panel h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 14px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .split-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 8px;
  }

  .split-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
  }

  .split-card.reached { border-color: var(--green); }
  .split-card.finish-card { border-color: var(--gold); }

  .split-card .cp-name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
  .split-card .cp-dist { font-size: 10px; color: var(--border); }
  .split-card .cp-time { font-size: 15px; font-family: monospace; font-weight: 700; margin-top: 4px; }
  .split-card .cp-pos  { font-size: 11px; color: var(--orange); margin-top: 2px; }
  .split-card .cp-empty { font-size: 13px; color: var(--border); margin-top: 4px; }

  /* ── EMPTY / LOADING STATE ── */
  .state-msg {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .state-msg .icon { font-size: 40px; margin-bottom: 12px; }
  .state-msg p { font-size: 15px; }
  .state-msg small { font-size: 12px; margin-top: 8px; display: block; }

/* ── LAST UPDATED ── */
  .last-updated {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 12px;
    color: var(--muted);
  }
  footer a {
    color: var(--orange);
    text-decoration: none;
  }
  footer a:hover { text-decoration: underline; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* ── MOBILE ── */
  @media (max-width: 640px) {
    /* Header */
    header {
      padding: 10px 16px;
      min-height: 56px;
      gap: 8px;
    }
    .header-title { gap: 6px; }
    .header-title h1 { font-size: 18px; }
    .header-title .edition { font-size: 11px; }
    .last-updated { display: none; }

    /* Stats: single non-wrapping scrollable row */
    .stats-bar {
      padding: 8px 16px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      gap: 16px;
    }
    .stat-item { flex-shrink: 0; font-size: 12px; }

    /* Controls: search full-width on top, filters scroll below */
    .controls {
      padding: 10px 16px;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .search-wrap { max-width: 100%; min-width: 0; }
    /* Prevent iOS from zooming in on input focus */
    #search { font-size: 16px; }

    .filters-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 4px;
    }
    .filter-group { flex-shrink: 0; }

    /* Bigger touch targets on pills */
    .pill { padding: 8px 14px; font-size: 13px; }

    /* Table: hide low-priority columns */
    .hide-mobile { display: none !important; }
    table { min-width: unset; }
    .table-wrap { padding: 0 8px 40px; }
    tbody td { padding: 10px 8px; }

    /* Split panel */
    .split-panel { padding: 12px; }
    .split-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .split-panel h3 { flex-wrap: wrap; font-size: 13px; }
  }
</style>
<script data-goatcounter="https://anderaus.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Zegama-Aizkorri</h1>
    <span class="edition">XXV · Mendi Maratoia · 17 May 2026</span>
  </div>
  <div class="header-meta">
        <div class="live-badge"><span class="live-dot"></span>Live</div>
    <span class="last-updated" id="last-updated"></span>
    <div class="refresh-info">
      Refresh in <span id="refresh-countdown">120</span>s
      <button class="btn-refresh" onclick="fetchData()">↺ Now</button>
    </div>
  </div>
</header>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item total">   <span class="val" id="s-total">—</span> Total</div>
  <div class="stat-item running"> <span class="val" id="s-running">—</span> Running</div>
  <div class="stat-item finished"><span class="val" id="s-finished">—</span> Finished</div>
  <div class="stat-item retired"> <span class="val" id="s-retired">—</span> Retired/DNF</div>
  <div class="stat-item waiting"> <span class="val" id="s-waiting">—</span> Not started</div>
</div>

<div class="controls">
  <!-- Search: always full-width on its own line on mobile -->
  <div class="search-wrap">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input id="search" type="text" placeholder="Search name or bib…" oninput="renderTable()">
  </div>

  <!-- Filters: single scrollable row on mobile -->
  <div class="filters-row">
    <div class="filter-group">
      <span class="filter-label">Sex</span>
      <button class="pill active" data-filter="sex" data-val="">All</button>
      <button class="pill" data-filter="sex" data-val="M" data-color="blue">M</button>
      <button class="pill" data-filter="sex" data-val="F" data-color="purple">F</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Cat.</span>
      <button class="pill active" data-filter="cat" data-val="">All</button>
      <button class="pill" data-filter="cat" data-val="SENM" data-color="blue">SEN M</button>
      <button class="pill" data-filter="cat" data-val="SENF" data-color="purple">SEN F</button>
      <button class="pill" data-filter="cat" data-val="VETM" data-color="gold">VET M</button>
      <button class="pill" data-filter="cat" data-val="VETF" data-color="orange">VET F</button>
    </div>

    <div class="filter-group">
      <span class="filter-label">Status</span>
      <button class="pill active" data-filter="status" data-val="">All</button>
      <button class="pill" data-filter="status" data-val="1" data-color="green">Running</button>
      <button class="pill" data-filter="status" data-val="0" data-color="gold">Finished</button>
      <button class="pill" data-filter="status" data-val="2">Retired</button>
    </div>

    <div class="filter-group">
      <button class="pill pill-fav" id="fav-toggle" onclick="toggleFavFilter()">⭐ Favs</button>
    </div>
  </div>
</div>

<div class="table-wrap">
  <div id="state-container">
    <div class="state-msg"><div class="icon">⛰️</div><p>Loading race data…</p></div>
  </div>
  <table id="main-table" style="display:none">
    <thead>
      <tr>
        <th data-col="pos"      class="sorted">#<span class="sort-arrow">↑</span></th>
        <th data-col="fav"      style="cursor:default">⭐</th>
        <th data-col="bib"      >Bib<span class="sort-arrow">↕</span></th>
        <th data-col="name"     >Name<span class="sort-arrow">↕</span></th>
        <th data-col="city"     class="hide-mobile">City<span class="sort-arrow">↕</span></th>
        <th data-col="cat"      >Cat.<span class="sort-arrow">↕</span></th>
        <th data-col="status"   >Status<span class="sort-arrow">↕</span></th>
        <th data-col="finish"   >Finish<span class="sort-arrow">↕</span></th>
        <th data-col="gap"      class="hide-mobile">Gap<span class="sort-arrow">↕</span></th>
        <th data-col="progress" class="hide-mobile" style="cursor:default;min-width:120px">Checkpoints</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="no-results" style="display:none" class="state-msg">
    <div class="icon">🔍</div><p>No runners match your filters.</p>
  </div>
</div>

<script>
const DATA_URL = '/api/results';
const REFRESH_INTERVAL = 120;

const CHECKPOINTS = [
  { name:'Ultzama',  dist:'8.5' },
  { name:'Atabako',  dist:'13.5' },
  { name:'Aratz',    dist:'16.1' },
  { name:'S.Spiritu',dist:'19.6' },
  { name:'Aizkolamendi',dist:'22' },
  { name:'Aketegi',  dist:'23.2' },
  { name:'Oltze',    dist:'26.6' },
  { name:'Urbia',    dist:'28.5' },
  { name:'Andraitz', dist:'30' },
  { name:'Moaño',    dist:'34.2' },
  { name:'Oazurgi',  dist:'37.8' },
  { name:'Murgia',   dist:'41' },
];

const STATUS_LABEL = { '0':'Finished','1':'Running','2':'Retired','3':'Disq.','4':'DNS' };

let allRows = [];
let favorites = new Set(JSON.parse(localStorage.getItem('zegama_favs') || '[]'));
let filters = { sex:'', cat:'', status:'' };
let favOnly = false;
let sortCol = 'pos';
let sortDir = 1;
let expandedBib = null;
let countdown = REFRESH_INTERVAL;
let countdownTimer = null;

// ── Fetch ──────────────────────────────────────────────────────────────────

async function fetchData() {
  resetCountdown();
  try {
    const res = await fetch(DATA_URL + '?_=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    allRows = json.aaData || [];
    updateStats();
    renderTable();
    document.getElementById('last-updated').textContent =
      'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    if (allRows.length === 0) {
      document.getElementById('state-container').innerHTML =
        '<div class="state-msg"><div class="icon">⚠️</div>' +
        '<p>Could not load data.</p>' +
        '<small>The server may be temporarily unavailable. Retrying…</small></div>';
    }
  }
}

function resetCountdown() {
  countdown = REFRESH_INTERVAL;
  updateCountdownDisplay();
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    countdown--;
    updateCountdownDisplay();
    if (countdown <= 0) fetchData();
  }, 1000);
}

function updateCountdownDisplay() {
  document.getElementById('refresh-countdown').textContent = countdown;
}

// ── Stats ──────────────────────────────────────────────────────────────────

function updateStats() {
  const counts = { '0':0,'1':0,'2':0,'3':0,'4':0 };
  allRows.forEach(r => { counts[r[19]] = (counts[r[19]]||0) + 1; });
  document.getElementById('s-total').textContent   = allRows.length;
  document.getElementById('s-running').textContent = counts['1'];
  document.getElementById('s-finished').textContent= counts['0'];
  document.getElementById('s-retired').textContent = (counts['2']||0) + (counts['3']||0);
  document.getElementById('s-waiting').textContent = counts['4'];
}

// ── Parsing ────────────────────────────────────────────────────────────────

function parseSplit(s) {
  // "(3) 1:02:45" or "(3) 0:32:47" or "() " or ""
  if (!s || !s.trim()) return null;
  const m = s.match(/\((\d*)\)\s*(\d+:\d+:\d+)/);
  if (!m) return null;
  return { pos: m[1] ? parseInt(m[1]) : null, time: m[2] };
}

function timeToSeconds(t) {
  if (!t) return Infinity;
  const parts = t.split(':').map(Number);
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return Infinity;
}

function parseRow(r, idx) {
  const splits = r.slice(4, 16).map(parseSplit);
  const finishRaw = r[16] || '';
  const finishTime = finishRaw.trim() || null;
  const catRaw  = r[18] || '';
  const catMatch = catRaw.match(/\((\d*)\)\s*([A-Z]+)/);
  return {
    originalIdx: idx,
    bib:    r[0],
    name:   r[1],
    sex:    r[2],
    city:   r[3],
    splits,
    finish: finishTime,
    gap:    r[17] || '',
    catCode: catMatch ? catMatch[2] : '',
    catPos:  catMatch && catMatch[1] ? parseInt(catMatch[1]) : null,
    status: r[19],
    splitsDone: splits.filter(Boolean).length,
  };
}

function formatName(fullName) {
  // "ALONSO MARTINEZ, SARA" → last: "ALONSO MARTINEZ", first: "Sara"
  const comma = fullName.indexOf(',');
  if (comma === -1) return { last: fullName, first: '' };
  const last  = fullName.slice(0, comma).trim();
  const first = fullName.slice(comma + 1).trim();
  return { last, first: first.charAt(0) + first.slice(1).toLowerCase() };
}

// ── Sorting ────────────────────────────────────────────────────────────────

function sortRows(rows) {
  return [...rows].sort((a, b) => {
    let va, vb;
    switch(sortCol) {
      case 'pos':
        // Running first by splits done desc, then by last split time; finished by finish time; rest last
        const order = { '0':0, '1':1, '2':2, '3':2, '4':3 };
        if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
        if (a.status === '0' && b.status === '0')
          return timeToSeconds(a.finish) - timeToSeconds(b.finish);
        if (a.status === '1' && b.status === '1') {
          if (a.splitsDone !== b.splitsDone) return b.splitsDone - a.splitsDone;
          const la = a.splits[a.splitsDone-1], lb = b.splits[b.splitsDone-1];
          if (la && lb) return timeToSeconds(la.time) - timeToSeconds(lb.time);
        }
        return a.originalIdx - b.originalIdx;
      case 'bib':    va = parseInt(a.bib)||0;  vb = parseInt(b.bib)||0;  return sortDir*(va-vb);
      case 'name':   return sortDir * a.name.localeCompare(b.name);
      case 'city':   return sortDir * a.city.localeCompare(b.city);
      case 'cat':    va = a.catCode||''; vb = b.catCode||''; return sortDir*va.localeCompare(vb);
      case 'status': va = a.status||''; vb = b.status||''; return sortDir*va.localeCompare(vb);
      case 'finish':
        return sortDir * (timeToSeconds(a.finish) - timeToSeconds(b.finish));
      case 'gap':
        return sortDir * (timeToSeconds(a.gap) - timeToSeconds(b.gap));
      default: return 0;
    }
  });
}

// ── Render ─────────────────────────────────────────────────────────────────

function renderTable() {
  const search = document.getElementById('search').value.toLowerCase();
  const parsed = allRows.map(parseRow);

  let visible = parsed.filter(r => {
    if (filters.sex    && r.sex !== filters.sex)           return false;
    if (filters.cat    && r.catCode !== filters.cat)        return false;
    if (filters.status && r.status !== filters.status)     return false;
    if (favOnly && !favorites.has(r.bib))                  return false;
    if (search) {
      const haystack = (r.name + ' ' + r.bib + ' ' + r.city).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  visible = sortRows(visible);

  const tbody = document.getElementById('tbody');
  const table = document.getElementById('main-table');
  const noRes = document.getElementById('no-results');
  const stateCon = document.getElementById('state-container');

  if (allRows.length === 0) return;

  stateCon.style.display = 'none';
  table.style.display = '';

  if (visible.length === 0) {
    tbody.innerHTML = '';
    noRes.style.display = '';
    return;
  }
  noRes.style.display = 'none';

  const frag = document.createDocumentFragment();

  visible.forEach((r, displayIdx) => {
    const isFav = favorites.has(r.bib);
    const isExpanded = expandedBib === r.bib;
    const { last, first } = formatName(r.name);

    // Position display
    let posDisplay;
    if (sortCol === 'pos' || sortCol === 'finish') {
      const medals = { 1:'🥇', 2:'🥈', 3:'🥉' };
      posDisplay = medals[displayIdx+1]
        ? `<span class="medal">${medals[displayIdx+1]}</span>`
        : displayIdx + 1;
    } else {
      posDisplay = r.originalIdx + 1;
    }

    // Category display
    const catClass = { SENM:'cat-senm', SENF:'cat-senf', VETM:'cat-vetm', VETF:'cat-vetf' }[r.catCode] || '';
    const catDisplay = r.catCode
      ? `<span class="${catClass}">${r.catCode}${r.catPos ? ' <small style="color:var(--muted)">'+r.catPos+'</small>' : ''}</span>`
      : '—';

    // Status badge
    const statusLabel = STATUS_LABEL[r.status] || r.status;
    const statusBadge = `<span class="status-badge status-${r.status}">${statusLabel}</span>`;

    // Progress bar (12 splits + 1 finish = 13 segments)
    const segs = CHECKPOINTS.map((_, i) =>
      `<div class="seg ${r.splits[i] ? 'done' : ''}"></div>`
    ).join('') + `<div class="seg ${r.finish ? 'finish' : ''}"></div>`;

    const tr = document.createElement('tr');
    tr.className = `row-${r.sex}${isFav ? ' row-fav' : ''}`;
    tr.dataset.bib = r.bib;
    tr.innerHTML = `
      <td class="pos">${posDisplay}</td>
      <td class="fav-cell">
        <button class="fav-btn ${isFav?'on':''}" title="${isFav?'Remove favorite':'Add favorite'}"
          onclick="toggleFav(event,'${r.bib}')">${isFav?'⭐':'☆'}</button>
      </td>
      <td class="bib-cell">${r.bib}</td>
      <td class="name-cell">
        ${last}<span class="firstname">${first}</span>
      </td>
      <td class="city-cell hide-mobile" title="${r.city}">${r.city}</td>
      <td class="cat-cell">${catDisplay}</td>
      <td>${statusBadge}</td>
      <td class="time-cell">${r.finish || '—'}</td>
      <td class="gap-cell hide-mobile">${r.gap ? '+'+r.gap : (r.finish ? '–' : '')}</td>
      <td class="hide-mobile">
        <div class="progress-bar" title="${r.splitsDone}/12 checkpoints">${segs}</div>
      </td>`;
    tr.addEventListener('click', (e) => {
      if (e.target.closest('.fav-btn')) return;
      toggleExpand(r.bib);
    });
    frag.appendChild(tr);

    if (isExpanded) {
      const expTr = document.createElement('tr');
      expTr.className = 'expanded-row';
      const expTd = document.createElement('td');
      expTd.colSpan = 10;
      expTd.innerHTML = buildSplitPanel(r);
      expTr.appendChild(expTd);
      frag.appendChild(expTr);
    }
  });

  tbody.innerHTML = '';
  tbody.appendChild(frag);
}

// ── Split panel ────────────────────────────────────────────────────────────

function buildSplitPanel(r) {
  const { last, first } = formatName(r.name);
  const cards = CHECKPOINTS.map((cp, i) => {
    const s = r.splits[i];
    if (s) {
      return `<div class="split-card reached">
        <div class="cp-name">${cp.name}</div>
        <div class="cp-dist">${cp.dist} km</div>
        <div class="cp-time">${s.time}</div>
        ${s.pos ? `<div class="cp-pos">Pos. ${s.pos}</div>` : ''}
      </div>`;
    }
    return `<div class="split-card">
      <div class="cp-name">${cp.name}</div>
      <div class="cp-dist">${cp.dist} km</div>
      <div class="cp-empty">–</div>
    </div>`;
  }).join('');

  const finishCard = r.finish ? `<div class="split-card finish-card">
    <div class="cp-name">Finish</div>
    <div class="cp-dist">42.5 km</div>
    <div class="cp-time">${r.finish}</div>
    ${r.gap ? `<div class="cp-pos">+${r.gap}</div>` : '<div class="cp-pos" style="color:var(--gold)">Leader</div>'}
  </div>` : `<div class="split-card">
    <div class="cp-name">Finish</div>
    <div class="cp-dist">42.5 km</div>
    <div class="cp-empty">–</div>
  </div>`;

  return `<div class="split-panel">
    <h3>
      <span style="color:var(--orange)">#${r.bib}</span>
      ${last}, ${first}
      <span style="font-size:12px;font-weight:400;color:var(--muted)">· ${r.city}</span>
    </h3>
    <div class="split-grid">${cards}${finishCard}</div>
  </div>`;
}

// ── Interactions ───────────────────────────────────────────────────────────

function toggleFav(e, bib) {
  e.stopPropagation();
  if (favorites.has(bib)) favorites.delete(bib);
  else favorites.add(bib);
  localStorage.setItem('zegama_favs', JSON.stringify([...favorites]));
  renderTable();
}

function toggleFavFilter() {
  favOnly = !favOnly;
  document.getElementById('fav-toggle').classList.toggle('active', favOnly);
  renderTable();
}

function toggleExpand(bib) {
  expandedBib = expandedBib === bib ? null : bib;
  renderTable();
}

// ── Filter pills ───────────────────────────────────────────────────────────

document.querySelectorAll('.pill[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    const filter = btn.dataset.filter;
    const val    = btn.dataset.val;
    const color  = btn.dataset.color || '';
    filters[filter] = val;

    document.querySelectorAll(`.pill[data-filter="${filter}"]`).forEach(b => {
      b.className = 'pill';
    });
    btn.classList.add(val ? `active-${color||''}`.replace('active-','active') : 'active');
    if (val && color) btn.classList.add(`active-${color}`);
    renderTable();
  });
});

// ── Sort headers ───────────────────────────────────────────────────────────

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (col === 'fav' || col === 'progress') return;
    if (sortCol === col) sortDir = -sortDir;
    else { sortCol = col; sortDir = 1; }

    document.querySelectorAll('thead th').forEach(h => {
      h.classList.remove('sorted');
      const arr = h.querySelector('.sort-arrow');
      if (arr) arr.textContent = '↕';
    });
    th.classList.add('sorted');
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = sortDir === 1 ? '↑' : '↓';
    renderTable();
  });
});

// ── Boot ───────────────────────────────────────────────────────────────────

fetchData();
</script>
